name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estoque-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verificar estilo (Checkstyle)
        run: mvn -B checkstyle:check

      - name: Executar testes
        run: mvn -B test

      - name: Build do projeto
        run: mvn -B package -DskipTests
